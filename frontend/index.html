<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - La Costera 28</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 400px; width: 100%; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <h2 class="mb-4">🍷 La Costera 28</h2>
        <p class="text-muted">Sistema de Inventario</p>
        
        <form id="loginForm">
            <div class="mb-3">
                <input type="email" id="correo" class="form-control" placeholder="Correo electrónico" required>
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Iniciar Sesión</button>
        </form>

        <div id="mensajeError" class="text-danger mt-3" style="display: none;">Credenciales incorrectas</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
